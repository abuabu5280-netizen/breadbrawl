<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言葉のパーティクル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #090916;
    overflow: hidden;
    font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }
  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 16px 22px;
    background: linear-gradient(transparent, rgba(9,9,22,0.95));
    z-index: 10;
  }
  #textInput {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 26px;
    color: white;
    font-size: 17px;
    font-family: inherit;
    padding: 11px 22px;
    width: min(360px, 55vw);
    outline: none;
    transition: border-color 0.25s, background 0.25s;
  }
  #textInput::placeholder { color: rgba(255,255,255,0.28); }
  #textInput:focus {
    border-color: rgba(160,140,255,0.55);
    background: rgba(255,255,255,0.1);
  }
  button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 22px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-family: inherit;
    padding: 11px 18px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  button:hover { background: rgba(255,255,255,0.16); }
  button.active {
    background: rgba(100,200,255,0.2);
    border-color: rgba(100,200,255,0.5);
    color: rgba(150,220,255,1);
  }
  #hint {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 1s;
  }
  #hint.hidden { opacity: 0; }
  #count {
    position: fixed;
    top: 16px;
    right: 18px;
    color: rgba(255,255,255,0.18);
    font-size: 11px;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">マウスで触れると文字が逃げます　／　重力を切り替えると漂います</div>
<div id="count"></div>
<div id="ui">
  <button id="gravityBtn">重力 OFF</button>
  <input type="text" id="textInput" placeholder="言葉を入力して Enter" maxlength="30" autocomplete="off" autofocus>
  <button id="clearBtn">クリア</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const textInput = document.getElementById('textInput');
const gravityBtn = document.getElementById('gravityBtn');
const clearBtn = document.getElementById('clearBtn');
const countEl = document.getElementById('count');
const hint = document.getElementById('hint');

let particles = [];
let gravity = false;
let mouseX = -9999, mouseY = -9999, mouseActive = false;
const MAX_PARTICLES = 280;
let wordCount = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY; mouseActive = true;
});
canvas.addEventListener('mouseleave', () => { mouseActive = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; mouseActive = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseActive = false; });

class Particle {
  constructor(char, sx, sy, hue) {
    this.char = char;
    this.x = sx; this.y = sy;

    const angle = Math.random() * Math.PI * 2;
    const speed = 2.5 + Math.random() * 8;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 3.5;

    this.rotation = (Math.random() - 0.5) * 0.5;
    this.rotVel = (Math.random() - 0.5) * 0.035;

    this.size = 20 + Math.floor(Math.random() * 22);
    this.hue = hue;
    this.sat = 80 + Math.random() * 20;

    this.alpha = 0;
    this.targetAlpha = 0.85 + Math.random() * 0.15;
    this.dying = false;
    this.dyingRate = 0.012 + Math.random() * 0.008;

    this.floatPhase = Math.random() * Math.PI * 2;
    this.floatFreq = 0.008 + Math.random() * 0.012;
    this.floatAmp = 0.025 + Math.random() * 0.055;
  }

  startDying() {
    this.dying = true;
  }

  update() {
    if (!this.dying) {
      this.alpha = Math.min(this.targetAlpha, this.alpha + 0.06);
    } else {
      this.alpha -= this.dyingRate;
    }

    if (gravity) {
      this.vy += 0.2;
    } else {
      this.floatPhase += this.floatFreq;
      this.vy += Math.sin(this.floatPhase) * this.floatAmp;
    }

    if (mouseActive) {
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const distSq = dx * dx + dy * dy;
      const R = 130;
      if (distSq < R * R && distSq > 0.01) {
        const dist = Math.sqrt(distSq);
        const force = ((R - dist) / R) ** 1.8 * 6;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }

    this.vx *= 0.965;
    this.vy *= 0.965;
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += this.rotVel;
    this.rotVel *= 0.98;

    const m = this.size * 0.6;
    const bottomEdge = canvas.height - 72;
    if (this.x < m)             { this.x = m;           this.vx =  Math.abs(this.vx) * 0.55; }
    if (this.x > canvas.width - m)  { this.x = canvas.width - m;  this.vx = -Math.abs(this.vx) * 0.55; }
    if (this.y < m)             { this.y = m;           this.vy =  Math.abs(this.vy) * 0.55; }
    if (this.y > bottomEdge)    { this.y = bottomEdge;  this.vy = -Math.abs(this.vy) * 0.55; }
  }

  isDead() { return this.alpha <= 0; }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.font = `bold ${this.size}px 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.shadowBlur = 22;
    ctx.shadowColor = `hsl(${this.hue},${this.sat}%,60%)`;
    ctx.fillStyle = `hsl(${this.hue},${this.sat}%,72%)`;
    ctx.fillText(this.char, 0, 0);

    ctx.shadowBlur = 7;
    ctx.fillStyle = `hsl(${this.hue},100%,92%)`;
    ctx.fillText(this.char, 0, 0);

    ctx.restore();
  }
}

let baseHue = Math.random() * 360;

function spawnWord(text, sx, sy) {
  wordCount++;
  baseHue = (baseHue + 38 + Math.random() * 55) % 360;
  const chars = [...text].filter(c => c !== ' ');

  const overflow = (particles.filter(p => !p.dying).length) + chars.length - MAX_PARTICLES;
  if (overflow > 0) {
    let n = 0;
    for (const p of particles) {
      if (!p.dying) { p.startDying(); if (++n >= overflow) break; }
    }
  }

  chars.forEach((char, i) => {
    const hue = (baseHue + i * 8) % 360;
    setTimeout(() => {
      particles.push(new Particle(char, sx, sy, hue));
    }, i * 45);
  });

  if (wordCount === 2) {
    setTimeout(() => hint.classList.add('hidden'), 3000);
  }
}

function loop() {
  ctx.fillStyle = 'rgba(9, 9, 22, 0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => !p.isDead());
  for (const p of particles) { p.update(); p.draw(); }

  const live = particles.filter(p => !p.dying).length;
  countEl.textContent = live > 0 ? `${live} 文字` : '';

  requestAnimationFrame(loop);
}

textInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const text = textInput.value.trim();
  if (!text) return;

  const rect = textInput.getBoundingClientRect();
  spawnWord(text, rect.left + rect.width / 2, rect.top + rect.height / 2);
  textInput.value = '';
});

gravityBtn.addEventListener('click', () => {
  gravity = !gravity;
  gravityBtn.textContent = gravity ? '重力 ON' : '重力 OFF';
  gravityBtn.classList.toggle('active', gravity);
});

clearBtn.addEventListener('click', () => {
  particles.forEach(p => p.startDying());
});

loop();
</script>
</body>
</html>
